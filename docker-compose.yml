services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      BIOWATCH_ENVIRONMENT: local
      BIOWATCH_DATABASE_URL: postgresql+asyncpg://biowatch:biowatch@postgres:5432/biowatch
      BIOWATCH_REDIS_URL: redis://redis:6379/0
      BIOWATCH_ELASTICSEARCH_URL: http://elasticsearch:9200
      BIOWATCH_ELASTICSEARCH_INDEX: biowatch-papers
      BIOWATCH_ELASTICSEARCH_TIMEOUT_SECONDS: 10.0
      BIOWATCH_EUROPE_PMC_TIMEOUT_SECONDS: 10.0
      BIOWATCH_EUROPE_PMC_MAX_ATTEMPTS: 3
      BIOWATCH_EUROPE_PMC_RETRY_BACKOFF_SECONDS: 0.25
      BIOWATCH_WORKER_METRICS_PORT: 9100
      BIOWATCH_TELEGRAM_BOT_TOKEN: ${BIOWATCH_TELEGRAM_BOT_TOKEN:-}
      BIOWATCH_LLM_PROVIDER: openai
      BIOWATCH_LLM_API_KEY: ${BIOWATCH_LLM_API_KEY:-}
      BIOWATCH_LLM_MODEL: ${BIOWATCH_LLM_MODEL:-gpt-5-mini}
      BIOWATCH_SUMMARY_PROMPT_VERSION: ${BIOWATCH_SUMMARY_PROMPT_VERSION:-v1}
      BIOWATCH_SUMMARY_WAIT_TIMEOUT_SECONDS: ${BIOWATCH_SUMMARY_WAIT_TIMEOUT_SECONDS:-15.0}
      BIOWATCH_DELIVERY_PREPARE_OFFSET_MINUTES: ${BIOWATCH_DELIVERY_PREPARE_OFFSET_MINUTES:-30}
      BIOWATCH_DELIVERY_PREPARE_SUMMARY_TIMEOUT_SECONDS: ${BIOWATCH_DELIVERY_PREPARE_SUMMARY_TIMEOUT_SECONDS:-1500.0}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  worker:
    build: .
    command: python -m app.jobs.worker
    environment:
      BIOWATCH_ENVIRONMENT: local
      BIOWATCH_DATABASE_URL: postgresql+asyncpg://biowatch:biowatch@postgres:5432/biowatch
      BIOWATCH_REDIS_URL: redis://redis:6379/0
      BIOWATCH_ELASTICSEARCH_URL: http://elasticsearch:9200
      BIOWATCH_ELASTICSEARCH_INDEX: biowatch-papers
      BIOWATCH_ELASTICSEARCH_TIMEOUT_SECONDS: 10.0
      BIOWATCH_EUROPE_PMC_TIMEOUT_SECONDS: 10.0
      BIOWATCH_EUROPE_PMC_MAX_ATTEMPTS: 3
      BIOWATCH_EUROPE_PMC_RETRY_BACKOFF_SECONDS: 0.25
      BIOWATCH_WORKER_METRICS_PORT: 9100
      BIOWATCH_TELEGRAM_BOT_TOKEN: ${BIOWATCH_TELEGRAM_BOT_TOKEN:-}
      BIOWATCH_LLM_PROVIDER: openai
      BIOWATCH_LLM_API_KEY: ${BIOWATCH_LLM_API_KEY:-}
      BIOWATCH_LLM_MODEL: ${BIOWATCH_LLM_MODEL:-gpt-5-mini}
      BIOWATCH_SUMMARY_PROMPT_VERSION: ${BIOWATCH_SUMMARY_PROMPT_VERSION:-v1}
      BIOWATCH_SUMMARY_WAIT_TIMEOUT_SECONDS: ${BIOWATCH_SUMMARY_WAIT_TIMEOUT_SECONDS:-15.0}
      BIOWATCH_DELIVERY_PREPARE_OFFSET_MINUTES: ${BIOWATCH_DELIVERY_PREPARE_OFFSET_MINUTES:-30}
      BIOWATCH_DELIVERY_PREPARE_SUMMARY_TIMEOUT_SECONDS: ${BIOWATCH_DELIVERY_PREPARE_SUMMARY_TIMEOUT_SECONDS:-1500.0}
    ports:
      - "9100:9100"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  summary-worker:
    build: .
    command: python -m app.jobs.summary_worker
    environment:
      BIOWATCH_ENVIRONMENT: local
      BIOWATCH_DATABASE_URL: postgresql+asyncpg://biowatch:biowatch@postgres:5432/biowatch
      BIOWATCH_REDIS_URL: redis://redis:6379/0
      BIOWATCH_ELASTICSEARCH_URL: http://elasticsearch:9200
      BIOWATCH_ELASTICSEARCH_INDEX: biowatch-papers
      BIOWATCH_WORKER_METRICS_PORT: 9100
      BIOWATCH_LLM_PROVIDER: openai
      BIOWATCH_LLM_API_KEY: ${BIOWATCH_LLM_API_KEY:-}
      BIOWATCH_LLM_MODEL: ${BIOWATCH_LLM_MODEL:-gpt-5-mini}
      BIOWATCH_SUMMARY_PROMPT_VERSION: ${BIOWATCH_SUMMARY_PROMPT_VERSION:-v1}
      BIOWATCH_DELIVERY_PREPARE_OFFSET_MINUTES: ${BIOWATCH_DELIVERY_PREPARE_OFFSET_MINUTES:-30}
      BIOWATCH_DELIVERY_PREPARE_SUMMARY_TIMEOUT_SECONDS: ${BIOWATCH_DELIVERY_PREPARE_SUMMARY_TIMEOUT_SECONDS:-1500.0}
    ports:
      - "9101:9100"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build: .
    command: python -m app.jobs.scheduler
    environment:
      BIOWATCH_ENVIRONMENT: local
      BIOWATCH_DATABASE_URL: postgresql+asyncpg://biowatch:biowatch@postgres:5432/biowatch
      BIOWATCH_REDIS_URL: redis://redis:6379/0
      BIOWATCH_ELASTICSEARCH_URL: http://elasticsearch:9200
      BIOWATCH_ELASTICSEARCH_INDEX: biowatch-papers
      BIOWATCH_SCHEDULER_INTERVAL_SECONDS: ${BIOWATCH_SCHEDULER_INTERVAL_SECONDS:-60}
      BIOWATCH_DELIVERY_PREPARE_OFFSET_MINUTES: ${BIOWATCH_DELIVERY_PREPARE_OFFSET_MINUTES:-30}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build: .
    command: python -m app.bot.main
    environment:
      BIOWATCH_ENVIRONMENT: local
      BIOWATCH_DATABASE_URL: postgresql+asyncpg://biowatch:biowatch@postgres:5432/biowatch
      BIOWATCH_REDIS_URL: redis://redis:6379/0
      BIOWATCH_ELASTICSEARCH_URL: http://elasticsearch:9200
      BIOWATCH_ELASTICSEARCH_INDEX: biowatch-papers
      BIOWATCH_TELEGRAM_BOT_TOKEN: ${BIOWATCH_TELEGRAM_BOT_TOKEN:-}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: biowatch
      POSTGRES_USER: biowatch
      POSTGRES_PASSWORD: biowatch
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biowatch -d biowatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "59200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  prometheus:
    image: prom/prometheus:v3.0.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/observability/prometheus/local.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api
      - worker
      - summary-worker

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:
