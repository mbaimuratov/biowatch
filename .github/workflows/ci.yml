name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python:
    name: Ruff and pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check .

      - name: Run pytest
        run: pytest

  docker:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: biowatch-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: biowatch-worker:ci
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  helm:
    name: Helm validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint infra/helm/biowatch -f infra/helm/biowatch/values-dev.yaml

      - name: Render dev values
        run: |
          helm template biowatch infra/helm/biowatch \
            --namespace biowatch \
            -f infra/helm/biowatch/values-dev.yaml

      - name: Render prod-like values
        run: |
          helm template biowatch infra/helm/biowatch \
            --namespace biowatch \
            -f infra/helm/biowatch/values-prod-like.yaml
