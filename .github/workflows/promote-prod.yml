name: Promote prod

on:
  workflow_run:
    workflows:
      - Publish image
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  promote:
    name: Open prod promotion PR
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Check prod branch
        run: |
          repo_url="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          if ! git ls-remote --exit-code --heads "$repo_url" prod >/dev/null; then
            echo "The prod branch does not exist. Create it from the current clean GitOps setup before promotion can run." >&2
            exit 1
          fi

      - name: Check out prod
        uses: actions/checkout@v4
        with:
          ref: prod
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set promotion metadata
        id: meta
        run: |
          sha="${{ github.event.workflow_run.head_sha }}"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=${sha:0:12}" >> "$GITHUB_OUTPUT"
          echo "branch=codex/promote-prod-${sha:0:12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify published image
        run: |
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}"
          docker buildx imagetools inspect "$image" > /tmp/biowatch-prod-image.txt
          grep -q "Platform:    linux/amd64" /tmp/biowatch-prod-image.txt
          grep -q "Platform:    linux/arm64" /tmp/biowatch-prod-image.txt

      - name: Merge main into promotion branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B "${{ steps.meta.outputs.branch }}"
          git merge --no-edit origin/main

      - name: Set prod image tag
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("infra/gitops/environments/prod/values.yaml")
          sha = "${{ steps.meta.outputs.sha }}"
          text = path.read_text()
          updated, count = re.subn(
              r"(?m)^  tag: [0-9a-f]{40}$",
              f"  tag: {sha}",
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit("could not update prod image tag")
          path.write_text(updated)
          PY

      - name: Validate promotion
        run: scripts/validate-prod-promotion.sh

      - name: Commit promotion
        run: |
          git add infra/gitops/environments/prod/values.yaml
          git commit -m "Promote prod to ${{ steps.meta.outputs.short_sha }}"

      - name: Push promotion branch
        run: git push --force-with-lease origin "${{ steps.meta.outputs.branch }}"

      - name: Open promotion PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh pr view "${{ steps.meta.outputs.branch }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            exit 0
          fi
          for attempt in 1 2 3; do
            if gh pr create \
              --repo "${{ github.repository }}" \
              --base prod \
              --head "${{ steps.meta.outputs.branch }}" \
              --title "Promote prod to ${{ steps.meta.outputs.short_sha }}" \
              --body "Promotes BioWatch production to image tag \`${{ steps.meta.outputs.sha }}\` after the multi-arch GHCR image was published and validated."; then
              exit 0
            fi
            sleep 10
            if gh pr view "${{ steps.meta.outputs.branch }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
              exit 0
            fi
          done
          exit 1
