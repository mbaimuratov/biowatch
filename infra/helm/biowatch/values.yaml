nameOverride: ""
fullnameOverride: ""

image:
  repository: biowatch
  tag: dev
  pullPolicy: IfNotPresent

app:
  environment: kind
  elasticsearchIndex: biowatch-papers
  elasticsearchTimeoutSeconds: "10.0"
  europePmcTimeoutSeconds: "10.0"
  europePmcMaxAttempts: "3"
  europePmcRetryBackoffSeconds: "0.25"

observability:
  prometheus:
    scrape: true
    apiPath: /metrics

secret:
  create: false
  existingSecret: biowatch-secret
  postgresPassword: ""
  databaseUrl: ""

serviceAccount:
  create: true
  annotations: {}

rbac:
  create: true

api:
  replicaCount: 1
  service:
    port: 8000
    annotations: {}
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  probes:
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
    liveness:
      initialDelaySeconds: 20
      periodSeconds: 20

worker:
  replicaCount: 1
  metrics:
    port: 9100
    service:
      annotations: {}
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

migration:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

postgres:
  image:
    repository: postgres
    tag: 16-alpine
    pullPolicy: IfNotPresent
  database: biowatch
  username: biowatch
  persistence:
    enabled: true
    size: 2Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

elasticsearch:
  image:
    repository: docker.elastic.co/elasticsearch/elasticsearch
    tag: 8.15.3
    pullPolicy: IfNotPresent
  javaOpts: -Xms512m -Xmx512m
  persistence:
    enabled: true
    size: 4Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi

ingress:
  enabled: true
  className: nginx
  host: biowatch.local
  annotations: {}

networkPolicy:
  enabled: true
  ingressNamespace: ingress-nginx

tests:
  image:
    repository: curlimages/curl
    tag: 8.11.1
    pullPolicy: IfNotPresent
