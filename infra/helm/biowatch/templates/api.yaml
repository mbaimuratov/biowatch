apiVersion: v1
kind: Service
metadata:
  name: {{ include "biowatch.fullname" . }}-api
  labels:
    {{- include "biowatch.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
  annotations:
    {{- if .Values.observability.prometheus.scrape }}
    prometheus.io/scrape: "true"
    prometheus.io/path: {{ .Values.observability.prometheus.apiPath | quote }}
    prometheus.io/port: {{ .Values.api.service.port | quote }}
    {{- end }}
    {{- with .Values.api.service.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
  selector:
    {{- include "biowatch.selectorLabels" (dict "root" . "component" "api") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "biowatch.fullname" . }}-api
  labels:
    {{- include "biowatch.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "biowatch.selectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "biowatch.selectorLabels" (dict "root" . "component" "api") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "biowatch.serviceAccountName" (dict "root" . "component" "api") }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          env:
            {{- include "biowatch.appEnv" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.api.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.api.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.liveness.periodSeconds }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
