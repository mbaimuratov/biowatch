{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "biowatch.serviceAccountName" (dict "root" . "component" "api") }}
  labels:
    {{- include "biowatch.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
