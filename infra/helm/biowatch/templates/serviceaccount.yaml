{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "biowatch.serviceAccountName" (dict "root" . "component" "api") }}
  labels:
    {{- include "biowatch.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "biowatch.serviceAccountName" (dict "root" . "component" "worker") }}
  labels:
    {{- include "biowatch.componentLabels" (dict "root" . "component" "worker") | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "biowatch.serviceAccountName" (dict "root" . "component" "summary-worker") }}
  labels:
    {{- include "biowatch.componentLabels" (dict "root" . "component" "summary-worker") | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "biowatch.serviceAccountName" (dict "root" . "component" "bot") }}
  labels:
    {{- include "biowatch.componentLabels" (dict "root" . "component" "bot") | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "biowatch.serviceAccountName" (dict "root" . "component" "scheduler") }}
  labels:
    {{- include "biowatch.componentLabels" (dict "root" . "component" "scheduler") | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{- if .Values.outboxPublisher.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "biowatch.serviceAccountName" (dict "root" . "component" "outbox-publisher") }}
  labels:
    {{- include "biowatch.componentLabels" (dict "root" . "component" "outbox-publisher") | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{- end }}
{{- if .Values.indexerConsumer.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "biowatch.serviceAccountName" (dict "root" . "component" "indexer-consumer") }}
  labels:
    {{- include "biowatch.componentLabels" (dict "root" . "component" "indexer-consumer") | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{- end }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "biowatch.serviceAccountName" (dict "root" . "component" "migration") }}
  labels:
    {{- include "biowatch.componentLabels" (dict "root" . "component" "migration") | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
  {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
