apiVersion: v1
kind: Service
metadata:
  name: {{ include "biowatch.fullname" . }}-elasticsearch
  labels:
    {{- include "biowatch.componentLabels" (dict "root" . "component" "elasticsearch") | nindent 4 }}
spec:
  ports:
    - name: http
      port: 9200
      targetPort: http
  selector:
    {{- include "biowatch.selectorLabels" (dict "root" . "component" "elasticsearch") | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "biowatch.fullname" . }}-elasticsearch
  labels:
    {{- include "biowatch.componentLabels" (dict "root" . "component" "elasticsearch") | nindent 4 }}
spec:
  serviceName: {{ include "biowatch.fullname" . }}-elasticsearch
  replicas: 1
  selector:
    matchLabels:
      {{- include "biowatch.selectorLabels" (dict "root" . "component" "elasticsearch") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "biowatch.selectorLabels" (dict "root" . "component" "elasticsearch") | nindent 8 }}
    spec:
      initContainers:
        - name: configure-vm-max-map-count
          image: busybox:1.36
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
      containers:
        - name: elasticsearch
          image: "{{ .Values.elasticsearch.image.repository }}:{{ .Values.elasticsearch.image.tag }}"
          imagePullPolicy: {{ .Values.elasticsearch.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 9200
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: {{ .Values.elasticsearch.javaOpts | quote }}
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            {{- toYaml .Values.elasticsearch.resources | nindent 12 }}
          volumeMounts:
            - name: elasticsearch-data
              mountPath: /usr/share/elasticsearch/data
  volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.elasticsearch.persistence.storageClassName }}
        storageClassName: {{ .Values.elasticsearch.persistence.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.elasticsearch.persistence.size | quote }}
