{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "biowatch.secretName" . }}
  labels:
    {{- include "biowatch.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "secret.postgresPassword is required when secret.create=true" .Values.secret.postgresPassword | quote }}
  BIOWATCH_DATABASE_URL: {{ required "secret.databaseUrl is required when secret.create=true" .Values.secret.databaseUrl | quote }}
  BIOWATCH_TELEGRAM_BOT_TOKEN: {{ .Values.secret.telegramBotToken | quote }}
  BIOWATCH_LLM_API_KEY: {{ .Values.secret.llmApiKey | quote }}
{{- end }}
