{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "biowatch.fullname" . }}-runtime
  labels:
    {{- include "biowatch.labels" . | nindent 4 }}
rules: []
---
{{- range $component := list "api" "worker" "bot" "scheduler" "migration" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "biowatch.fullname" $ }}-{{ $component }}-runtime
  labels:
    {{- include "biowatch.componentLabels" (dict "root" $ "component" $component) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "biowatch.fullname" $ }}-runtime
subjects:
  - kind: ServiceAccount
    name: {{ include "biowatch.serviceAccountName" (dict "root" $ "component" $component) }}
    namespace: {{ $.Release.Namespace }}
{{- if ne $component "migration" }}
---
{{- end }}
{{- end }}
{{- end }}
