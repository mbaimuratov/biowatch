apiVersion: v1
kind: Pod
metadata:
  name: {{ include "biowatch.fullname" . }}-health-test
  labels:
    {{- include "biowatch.componentLabels" (dict "root" . "component" "test") | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: "{{ .Values.tests.image.repository }}:{{ .Values.tests.image.tag }}"
      imagePullPolicy: {{ .Values.tests.image.pullPolicy }}
      command:
        - sh
        - -c
        - curl -fsS "http://{{ include "biowatch.fullname" . }}-api:{{ .Values.api.service.port }}/health"
