apiVersion: v1
kind: Secret
metadata:
  name: biowatch-secret
  namespace: biowatch
  labels:
    app.kubernetes.io/name: biowatch
type: Opaque
stringData:
  # Development-only values for kind. Replace these in any shared environment.
  POSTGRES_PASSWORD: biowatch
  BIOWATCH_DATABASE_URL: postgresql+asyncpg://biowatch:biowatch@biowatch-postgres:5432/biowatch
  BIOWATCH_TELEGRAM_BOT_TOKEN: ""
