apiVersion: v1
kind: Service
metadata:
  name: biowatch-worker
  namespace: biowatch
  labels:
    app.kubernetes.io/name: biowatch
    app.kubernetes.io/component: worker
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "9100"
spec:
  ports:
    - name: metrics
      port: 9100
      targetPort: metrics
  selector:
    app.kubernetes.io/name: biowatch
    app.kubernetes.io/component: worker
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: biowatch-worker
  namespace: biowatch
  labels:
    app.kubernetes.io/name: biowatch
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: biowatch
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: biowatch
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: biowatch-worker
      containers:
        - name: worker
          image: biowatch:dev
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - app.jobs.worker
          ports:
            - name: metrics
              containerPort: 9100
          envFrom:
            - configMapRef:
                name: biowatch-config
            - secretRef:
                name: biowatch-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
