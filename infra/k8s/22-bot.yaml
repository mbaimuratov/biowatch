apiVersion: apps/v1
kind: Deployment
metadata:
  name: biowatch-bot
  namespace: biowatch
  labels:
    app.kubernetes.io/name: biowatch
    app.kubernetes.io/component: bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: biowatch
      app.kubernetes.io/component: bot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: biowatch
        app.kubernetes.io/component: bot
    spec:
      serviceAccountName: biowatch-bot
      containers:
        - name: bot
          image: biowatch:dev
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - app.bot.main
          envFrom:
            - configMapRef:
                name: biowatch-config
            - secretRef:
                name: biowatch-secret
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
