apiVersion: v1
kind: Service
metadata:
  name: biowatch-elasticsearch
  namespace: biowatch
  labels:
    app.kubernetes.io/name: biowatch
    app.kubernetes.io/component: elasticsearch
spec:
  ports:
    - name: http
      port: 9200
      targetPort: http
  selector:
    app.kubernetes.io/name: biowatch
    app.kubernetes.io/component: elasticsearch
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: biowatch-elasticsearch
  namespace: biowatch
  labels:
    app.kubernetes.io/name: biowatch
    app.kubernetes.io/component: elasticsearch
spec:
  serviceName: biowatch-elasticsearch
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: biowatch
      app.kubernetes.io/component: elasticsearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: biowatch
        app.kubernetes.io/component: elasticsearch
    spec:
      initContainers:
        - name: configure-vm-max-map-count
          image: busybox:1.36
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9200
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: -Xms512m -Xmx512m
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: elasticsearch-data
              mountPath: /usr/share/elasticsearch/data
  volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 4Gi
