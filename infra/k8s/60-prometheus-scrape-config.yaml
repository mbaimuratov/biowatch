apiVersion: v1
kind: ConfigMap
metadata:
  name: biowatch-prometheus-scrape-config
  namespace: biowatch
  labels:
    app.kubernetes.io/name: biowatch
    app.kubernetes.io/component: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: biowatch-api
        metrics_path: /metrics
        static_configs:
          - targets:
              - biowatch-api.biowatch.svc.cluster.local:8000

      - job_name: biowatch-worker
        metrics_path: /metrics
        static_configs:
          - targets:
              - biowatch-worker.biowatch.svc.cluster.local:9100

      - job_name: biowatch-summary-worker
        metrics_path: /metrics
        static_configs:
          - targets:
              - biowatch-summary-worker.biowatch.svc.cluster.local:9100
